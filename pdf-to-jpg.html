<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>PDF to JPG Converter - FastTools</title>

<meta name="description" content="Convert PDF pages to JPG images online instantly.">

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";
</script>

<style>

.drop-area{
border:2px dashed #cbd5e1;
padding:40px;
border-radius:10px;
background:#f8fafc;
margin-top:20px;
cursor:pointer;
}

.preview-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:20px;
margin-top:25px;
}

.preview-item{
background:#f8fafc;
border:1px solid #cbd5e1;
padding:10px;
border-radius:8px;
text-align:center;
}

.preview-item canvas{
width:100%;
border-radius:6px;
}

.download-btn{
display:block;
margin-top:10px;
padding:8px 10px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px;
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>PDF to JPG</h1>

<p>Upload a PDF and download each page as a JPG image.</p>

<div class="drop-area" id="drop-area">

<p>Drag PDF here or click to upload</p>

<input type="file" id="file-input" accept=".pdf" hidden>

</div>

<div class="preview-grid" id="preview"></div>

</div>


<div class="more-tools">

<h3>More Tools</h3>

<a href="split-pdf.html">Split PDF</a>
<a href="merge-pdf.html">Merge PDF</a>
<a href="jpg-to-pdf.html">JPG to PDF</a>
<a href="compress-image.html">Image Compressor</a>

</div>


<footer class="site-footer">
<p>
© 2026 FastTools • Free Online Tools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>
</footer>


<script>

const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("file-input");
const preview = document.getElementById("preview");

dropArea.onclick = () => fileInput.click();

dropArea.addEventListener("dragover", e=>{
e.preventDefault();
});

dropArea.addEventListener("drop", e=>{
e.preventDefault();
handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", ()=>{
handleFile(fileInput.files[0]);
});


async function handleFile(file){

if(!file) return;

preview.innerHTML="";

const buffer = await file.arrayBuffer();

const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

for(let i=1;i<=pdf.numPages;i++){

const page = await pdf.getPage(i);

const viewport = page.getViewport({scale:1.2});

const canvas = document.createElement("canvas");

const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport:viewport
}).promise;

const box = document.createElement("div");

box.className="preview-item";

box.appendChild(canvas);

const link = document.createElement("a");

link.className="download-btn";
link.innerText="Download JPG";

link.onclick = ()=>{

const img = canvas.toDataURL("image/jpeg",0.95);

const a = document.createElement("a");

a.href = img;
a.download = "page-"+i+".jpg";

a.click();

};

box.appendChild(link);

preview.appendChild(box);

}

}

</script>

</body>
</html>
