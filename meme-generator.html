<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Meme Generator - FastTools</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<style>

.editor{
display:grid;
grid-template-columns:1fr 280px;
gap:30px;
max-width:1000px;
margin:auto;
margin-top:30px;
align-items:start;
}

canvas{
border-radius:10px;
border:1px solid #cbd5e1;
width:100%;
max-height:500px;
background:#111;
}

.controls{
display:flex;
flex-direction:column;
gap:12px;
}

.controls input,
.controls select{
padding:10px;
border-radius:6px;
border:1px solid #cbd5e1;
font-size:14px;
}

.controls button{
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.controls button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>Meme Generator</h1>
<p>Create memes with draggable text.</p>

<input type="file" id="upload" accept="image/*">

<div class="editor">

<div>
<canvas id="canvas"></canvas>
</div>

<div class="controls">

<input type="text" id="topText" placeholder="Top text">
<input type="text" id="bottomText" placeholder="Bottom text">

<label>Font Size</label>
<input type="range" id="fontSize" min="20" max="100" value="50">

<label>Text Color</label>
<input type="color" id="textColor" value="#ffffff">

<button onclick="downloadMeme()">Download Meme</button>

</div>

</div>

</div>


<footer class="site-footer">

<p>
© 2026 FastTools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>

</footer>


<script>

const canvas = document.getElementById("memeCanvas");
const ctx = canvas.getContext("2d");

let img = new Image();

document.getElementById("upload").addEventListener("change", function(){

const file = this.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){
img.src = e.target.result;
};

reader.readAsDataURL(file);

});

img.onload = function(){

// scale image to fit canvas width
const maxWidth = 800;

let scale = Math.min(maxWidth / img.width, 1);

canvas.width = img.width * scale;
canvas.height = img.height * scale;

draw();

};

document.querySelectorAll("input").forEach(el=>{
el.addEventListener("input",draw);
});

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const topText = document.getElementById("topText").value;
const bottomText = document.getElementById("bottomText").value;

const fontSize = document.getElementById("fontSize").value;
const color = document.getElementById("textColor").value;
const strokeWidth = document.getElementById("strokeWidth").value;

ctx.font = `bold ${fontSize}px Impact`;
ctx.fillStyle = color;
ctx.strokeStyle = "black";
ctx.lineWidth = strokeWidth;
ctx.textAlign = "center";

ctx.fillText(topText,canvas.width/2,60);
ctx.strokeText(topText,canvas.width/2,60);

ctx.fillText(bottomText,canvas.width/2,canvas.height-30);
ctx.strokeText(bottomText,canvas.width/2,canvas.height-30);

}

function downloadMeme(){

const link = document.createElement("a");

link.download="meme.png";
link.href=canvas.toDataURL("image/png");

link.click();

}

</script>

</body>
</html>
