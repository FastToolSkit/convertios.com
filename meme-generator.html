<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Meme Generator - FastTools</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<style>

.editor{
display:grid;
grid-template-columns:1fr 280px;
gap:30px;
max-width:1000px;
margin:auto;
margin-top:30px;
align-items:start;
}

canvas{
border-radius:10px;
border:1px solid #cbd5e1;
width:100%;
max-height:500px;
background:#111;
}

.controls{
display:flex;
flex-direction:column;
gap:12px;
}

.controls input,
.controls select{
padding:10px;
border-radius:6px;
border:1px solid #cbd5e1;
font-size:14px;
}

.controls button{
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.controls button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>Meme Generator</h1>
<p>Create memes with draggable text.</p>

<input type="file" id="upload" accept="image/*">

<div class="editor">

<div>
<canvas id="canvas"></canvas>
</div>

<div class="controls">

<input type="text" id="topText" placeholder="Top text">
<input type="text" id="bottomText" placeholder="Bottom text">

<label>Font Size</label>
<input type="range" id="fontSize" min="20" max="100" value="50">

<label>Text Color</label>
<input type="color" id="textColor" value="#ffffff">

<button onclick="downloadMeme()">Download Meme</button>

</div>

</div>

</div>


<footer class="site-footer">

<p>
© 2026 FastTools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>

</footer>


<script>

const canvas = new fabric.Canvas('canvas');

let topTextObj;
let bottomTextObj;

document.getElementById("upload").addEventListener("change", function(){

const file = this.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

fabric.Image.fromURL(e.target.result,function(img){

canvas.clear();

const maxWidth = 600;
const scale = img.width > maxWidth ? maxWidth / img.width : 1;

canvas.setWidth(img.width * scale);
canvas.setHeight(img.height * scale);

img.scale(scale);

canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));

topTextObj = new fabric.Textbox('TOP TEXT',{
left:canvas.width/2,
top:40,
originX:'center',
fontSize:50,
fill:'white',
stroke:'black',
strokeWidth:3,
fontFamily:'Impact',
textAlign:'center'
});

bottomTextObj = new fabric.Textbox('BOTTOM TEXT',{
left:canvas.width/2,
top:canvas.height-80,
originX:'center',
fontSize:50,
fill:'white',
stroke:'black',
strokeWidth:3,
fontFamily:'Impact',
textAlign:'center'
});

canvas.add(topTextObj);
canvas.add(bottomTextObj);

});

};

reader.readAsDataURL(file);

});


document.getElementById("topText").addEventListener("input",e=>{
if(topTextObj){
topTextObj.text = e.target.value;
canvas.renderAll();
}
});

document.getElementById("bottomText").addEventListener("input",e=>{
if(bottomTextObj){
bottomTextObj.text = e.target.value;
canvas.renderAll();
}
});


document.getElementById("fontSize").addEventListener("input",e=>{
const size = parseInt(e.target.value);

const active = canvas.getActiveObject();
if(active){
active.set({fontSize:size});
canvas.renderAll();
}
});


document.getElementById("textColor").addEventListener("input",e=>{
const active = canvas.getActiveObject();
if(active){
active.set({fill:e.target.value});
canvas.renderAll();
}
});


function downloadMeme(){

const link = document.createElement("a");

link.download="meme.png";
link.href=canvas.toDataURL({
format:'png',
quality:1
});

link.click();

}

</script>

</body>
</html>
