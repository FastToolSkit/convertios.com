<!DOCTYPE html>
<html>

<head>

<title>MP3 Cutter - FastTools</title>

<meta name="description" content="Trim MP3 audio files online with FastTools">

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/wavesurfer.js"></script>
<script src="https://unpkg.com/wavesurfer.js/dist/plugins/regions.min.js"></script>

<style>

#waveform{
margin-top:30px;
}

.trim-controls{
margin-top:25px;
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<div class="back-bar">
<a href="index.html">← Back to FastTools</a>
</div>

<div class="tool-container">

<h1>MP3 Cutter</h1>

<p>Upload an MP3 and drag the selection to trim.</p>

<input type="file" id="audioFile" accept="audio/*">

<div id="waveform"></div>

<div class="trim-controls">

<button class="main-button" onclick="playPause()">Play / Pause</button>

<button class="main-button" onclick="trimAudio()">Trim Audio</button>

</div>

<br>

<a id="downloadLink"></a>

</div>

<footer class="site-footer">

<p>
© FastTools |
<a href="privacy.html">Privacy</a> |
<a href="terms.html">Terms</a> |
<a href="contact.html">Contact</a>
</p>

</footer>

<script>

let wavesurfer
let region
let audioBuffer
let audioContext = new AudioContext()

const regionsPlugin = WaveSurfer.regions.create()

wavesurfer = WaveSurfer.create({
container:"#waveform",
waveColor:"#94a3b8",
progressColor:"#2563eb",
height:120,
plugins:[regionsPlugin]
})

document.getElementById("audioFile").addEventListener("change", async function(e){

const file = e.target.files[0]

const arrayBuffer = await file.arrayBuffer()

audioBuffer = await audioContext.decodeAudioData(arrayBuffer)

wavesurfer.loadBlob(file)

wavesurfer.once("ready", () => {

region = wavesurfer.addRegion({
start:0,
end:Math.min(10, wavesurfer.getDuration()),
drag:true,
resize:true,
color:"rgba(37,99,235,0.3)"
})

})

})

function playPause(){
wavesurfer.playPause()
}

function trimAudio(){

if(!region || !audioBuffer){
alert("Upload audio first")
return
}

const start = region.start
const end = region.end

const sampleRate = audioBuffer.sampleRate

const startOffset = Math.floor(start * sampleRate)
const endOffset = Math.floor(end * sampleRate)

const frameCount = endOffset - startOffset

const newBuffer = audioContext.createBuffer(
audioBuffer.numberOfChannels,
frameCount,
sampleRate
)

for(let channel=0; channel<audioBuffer.numberOfChannels; channel++){

const oldData = audioBuffer.getChannelData(channel)
const newData = newBuffer.getChannelData(channel)

for(let i=0;i<frameCount;i++){
newData[i] = oldData[i + startOffset]
}

}

const blob = bufferToWave(newBuffer)

const url = URL.createObjectURL(blob)

const link = document.getElementById("downloadLink")

link.href = url
link.download = "trimmed-audio.wav"
link.innerText = "Download Trimmed Audio"

}

function bufferToWave(buffer){

const numOfChan = buffer.numberOfChannels
const length = buffer.length * numOfChan * 2 + 44
const arrayBuffer = new ArrayBuffer(length)
const view = new DataView(arrayBuffer)

let offset = 0

function writeString(str){
for(let i=0;i<str.length;i++){
view.setUint8(offset++,str.charCodeAt(i))
}
}

writeString("RIFF")
view.setUint32(offset,36 + buffer.length * 2,true); offset+=4
writeString("WAVE")
writeString("fmt ")
view.setUint32(offset,16,true); offset+=4
view.setUint16(offset,1,true); offset+=2
view.setUint16(offset,numOfChan,true); offset+=2
view.setUint32(offset,buffer.sampleRate,true); offset+=4
view.setUint32(offset,buffer.sampleRate * 2,true); offset+=4
view.setUint16(offset,numOfChan * 2,true); offset+=2
view.setUint16(offset,16,true); offset+=2
writeString("data")
view.setUint32(offset,buffer.length * 2,true); offset+=4

for(let i=0;i<buffer.length;i++){
for(let channel=0;channel<numOfChan;channel++){
let sample = buffer.getChannelData(channel)[i]
sample = Math.max(-1,Math.min(1,sample))
view.setInt16(offset,sample<0?sample*0x8000:sample*0x7FFF,true)
offset+=2
}
}

return new Blob([view],{type:"audio/wav"})

}

</script>

</body>
</html>
