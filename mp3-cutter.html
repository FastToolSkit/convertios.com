<!DOCTYPE html>
<html>
<head>

<title>MP3 Cutter</title>

<script src="https://unpkg.com/wavesurfer.js@7"></script>

<style>

body{
background:#0a1628;
font-family:Arial;
color:white;
text-align:center;
padding-top:80px;
}

#waveform{
width:900px;
margin:40px auto;
}

</style>

</head>

<body>

<h2>MP3 Cutter</h2>

<input type="file" id="audio">

<div id="waveform"></div>

<script>

const wavesurfer = WaveSurfer.create({
container: '#waveform',
waveColor: '#555',
progressColor: '#2a84ff',
height:120
})

document.getElementById("audio").addEventListener("change", function(e){

const file = e.target.files[0]

if(!file) return

const url = URL.createObjectURL(file)

wavesurfer.load(url)

})

</script>

</body>
</html>
