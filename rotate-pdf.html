<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Rotate PDF - FastTools</title>

<meta name="description" content="Rotate PDF pages online instantly and download the corrected document.">

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>Rotate PDF</h1>

<p>Upload a PDF and rotate all pages instantly.</p>

<div class="upload-box">

<label class="upload-btn">
Upload PDF
<input type="file" id="file-input" accept=".pdf">
</label>

<span id="file-name"></span>

</div>

<div style="margin-top:25px">

<label>Rotation Angle</label>

<select id="angle" style="padding:10px;margin-top:10px">

<option value="90">90°</option>
<option value="180">180°</option>
<option value="270">270°</option>

</select>

</div>

<button class="main-button" id="rotateBtn">
Rotate PDF
</button>

<div id="loader" style="display:none;margin-top:20px">

<p>Processing PDF...</p>

<div class="spinner"></div>

</div>

</div>


<div class="more-tools">

<h3>More Tools</h3>

<a href="split-pdf.html">Split PDF</a>
<a href="merge-pdf.html">Merge PDF</a>
<a href="pdf-to-jpg.html">PDF to JPG</a>
<a href="jpg-to-pdf.html">JPG to PDF</a>

</div>


<footer class="site-footer">
<p>
© 2026 FastTools • Free Online Tools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>
</footer>


<script>

let pdfFile = null;

const fileInput = document.getElementById("file-input");
const fileName = document.getElementById("file-name");
const rotateBtn = document.getElementById("rotateBtn");
const loader = document.getElementById("loader");

fileInput.addEventListener("change", ()=>{

pdfFile = fileInput.files[0];

fileName.textContent = pdfFile ? pdfFile.name : "";

});


rotateBtn.addEventListener("click", rotatePDF);


async function rotatePDF(){

if(!pdfFile){

alert("Upload a PDF first");

return;

}

loader.style.display="block";

const bytes = await pdfFile.arrayBuffer();

const pdfDoc = await PDFLib.PDFDocument.load(bytes);

const pages = pdfDoc.getPages();

const angle = parseInt(document.getElementById("angle").value);

pages.forEach(page => {

page.setRotation(PDFLib.degrees(angle));

});

const newBytes = await pdfDoc.save();

const blob = new Blob([newBytes],{type:"application/pdf"});

const url = URL.createObjectURL(blob);

const link = document.createElement("a");

link.href = url;
link.download = "rotated.pdf";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

loader.style.display="none";

}

</script>

</body>
</html>
